<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- iPhone Web App -->
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/684/684908.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="新竹一日遊">
<meta name="theme-color" content="#f9f7f4">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&family=Noto+Sans+TC&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<title>新竹一日遊</title>

<style>
:root {
  --bg:#f9f7f4;
  --card:#ffffff;
  --soft:#f3f0eb;
  --text:#3d3830;
  --sub:#7a7268;
  --accent:#8fa8b8;
}

body{
  margin:0;
  font-family:"M PLUS Rounded 1c","Noto Sans TC";
  background:var(--bg);
  color:var(--text);
}

.container{padding:16px;}

.card{
  background:var(--card);
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
  border:1px solid rgba(0,0,0,0.05);
}

.sub{color:var(--sub);}

/* 地圖 */
#map{
  height:300px;
  border-radius:16px;
  margin-bottom:10px;
}

/* 按鈕 */
.btn{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  border:1px solid var(--accent);
  color:var(--accent);
  text-decoration:none;
  margin-top:6px;
}
.btn:hover{
  background:var(--accent);
  color:white;
}

/* 倒數 */
#countdown span{
  font-size:22px;
  color:var(--accent);
}

.progress{
  background:var(--soft);
  height:10px;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.bar{
  height:100%;
  width:0%;
  background:var(--accent);
  transition:0.5s;
}
</style>
</head>

<body>

<div class="container">

<h1>🌿 新竹一日遊</h1>

<!-- 倒數 -->
<div class="card">
  <h3>⏳ 倒數</h3>
  <div id="countdown">載入中</div>
  <div class="progress"><div id="bar" class="bar"></div></div>
</div>

<!-- 地圖 -->
<div class="card">
  <h3>🗺️ 行程地圖</h3>
  <div id="map"></div>
  <div id="detail" class="sub">請點擊地圖景點查看詳細資訊</div>
</div>

<!-- 行前通知 -->
<div class="card">
  <h3>📢 行前通知</h3>
  <p><b>集合：</b>07:30 台北車站南二門</p>
  <p><b>出發：</b>08:00</p>
  <p class="sub">請攜帶員工證、穿舒適鞋、準時集合</p>

  <a href="tel:0935734109" class="btn">📞 聯絡領隊</a>
  <a href="https://maps.google.com/?q=台北車站南二門" class="btn" target="_blank">📍 導航集合地點</a>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===== 地圖 =====
const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const spots = [
{n:"好客文創園區",lat:24.878,lng:121.045,desc:"客家文化園區",detail:"紅磚街屋與農村文化體驗",map:"https://maps.google.com?q=湖口好客文創園區"},
{n:"莫內饗宴",lat:24.807,lng:120.967,desc:"高級自助餐",detail:"煙波湖濱館Buffet",map:"https://maps.google.com?q=煙波新竹湖濱館"},
{n:"青草湖",lat:24.785,lng:120.970,desc:"湖景步道",detail:"映月橋與湖畔景觀",map:"https://maps.google.com?q=青草湖"},
{n:"關西農會",lat:24.791,lng:121.177,desc:"農產市場",detail:"客家伴手禮與農產品",map:"https://maps.google.com?q=關西農會"}
];

const bounds=[];

spots.forEach(s=>{
  const m=L.marker([s.lat,s.lng]).addTo(map);
  bounds.push([s.lat,s.lng]);

  m.on('click',()=>{
    document.getElementById("detail").innerHTML=
    `<h4>${s.n}</h4>
    <p>${s.desc}</p>
    <p class="sub">${s.detail}</p>
    <a href="${s.map}" target="_blank" class="btn">📍 導航</a>`;
  });
});

map.fitBounds(bounds,{padding:[30,30]});

// ===== 倒數 =====
const start=new Date("2026-04-12T07:30:00");
const end=new Date("2026-04-12T08:00:00");

function run(){
 let now=new Date();
 let diff=end-now;

 if(diff<=0){
  countdown.innerHTML="🎉 已出發！";
  bar.style.width="100%";
  return;
 }

 let d=Math.floor(diff/86400000);
 let h=Math.floor(diff/3600000)%24;
 let m=Math.floor(diff/60000)%60;
 let s=Math.floor(diff/1000)%60;

 countdown.innerHTML=
 `${d}天 ${h}時 ${m}分 <span>${s}</span>秒`;

 let p=(now-start)/(end-start)*100;
 if(p<0)p=0;if(p>100)p=100;
 bar.style.width=p+"%";
}

setInterval(run,1000);
run();
</script>

</body>
</html>
