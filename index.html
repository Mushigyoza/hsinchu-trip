<title>新竹一日遊</title>

<style>
:root {
  --bg-main:#f9f7f4;
  --bg-card:#ffffff;
  --bg-soft:#f3f0eb;
  --border:rgba(180,164,144,0.2);
  --text-main:#3d3830;
  --text-sub:#7a7268;
  --accent:#8fa8b8;
}

body {
  margin:0;
  font-family:"M PLUS Rounded 1c","Noto Sans TC",sans-serif;
  background:var(--bg-main);
  color:var(--text-main);
}

.container {
  padding:16px;
}
@media(min-width:600px){
  .container{padding:40px;}
}

.card {
  background:white;
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
  border:1.5px solid var(--border);
}

#map {
  height:320px;
  border-radius:20px;
  overflow:hidden;
  border:1.5px solid var(--border);
}

#detail {
  margin-top:12px;
  background:var(--bg-soft);
  padding:16px;
  border-radius:16px;
}

.btn {
  margin-top:10px;
  padding:8px 16px;
  border-radius:999px;
  border:1.5px solid var(--accent);
  color:var(--accent);
  background:none;
  cursor:pointer;
}
.btn:hover{
  background:var(--accent);
  color:white;
}

.sub{color:var(--text-sub);}
</style>
</head>

<body>

<div class="container">

<h1>🌿 新竹一日遊</h1>

<div class="card">
  <h3>行程</h3>
  <p>台北 → 好客文創園區 → 莫內饗宴 → 青草湖 → 關西農會</p>
</div>

<div class="card">
  <h3>地圖導覽</h3>
  <div id="map"></div>

  <div id="detail">
    <h3>請點擊地圖景點</h3>
    <p class="sub">點擊地標查看詳細介紹</p>
  </div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([24.8,121.0],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const spots = [
{
name:"好客文創園區",
lat:24.878,lng:121.045,
desc:"客家文化園區",
detail:"紅磚街屋與農村文化，展示客家生活與藝術。",
map:"https://www.google.com/maps?q=湖口好客文創園區"
},
{
name:"莫內饗宴",
lat:24.807,lng:120.967,
desc:"高級自助餐",
detail:"歐式風格 Buffet，結合在地與國際料理。",
map:"https://www.google.com/maps?q=煙波新竹湖濱館"
},
{
name:"青草湖",
lat:24.785,lng:120.970,
desc:"湖景步道",
detail:"映月橋與湖畔景觀，適合散步拍照。",
map:"https://www.google.com/maps?q=青草湖"
},
{
name:"關西農會",
lat:24.791,lng:121.177,
desc:"農產品市場",
detail:"在地農產與客家伴手禮採購。",
map:"https://www.google.com/maps?q=關西農會"
}
];

function update(s){
document.getElementById("detail").innerHTML=`
<h3>${s.name}</h3>
<p class="sub">${s.desc}</p>
<p>${s.detail}</p>
<button class="btn" onclick="window.open('${s.map}')">導航</button>
`;
}

spots.forEach(s=>{
let m=L.marker([s.lat,s.lng]).addTo(map);
m.on('click',()=>update(s));
});
</script>

</body>
</html>
