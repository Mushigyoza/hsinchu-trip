<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&family=Noto+Sans+TC&display=swap" rel="stylesheet">

<title>新竹導覽App</title>

<style>
body{
  margin:0;
  font-family:"M PLUS Rounded 1c","Noto Sans TC";
  background:#f9f7f4;
}
.container{padding:16px;}

.card{
  background:#fff;
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
}

/* 路線說明 */
.route{
  background:#f3f0eb;
  padding:10px;
  border-radius:14px;
  font-size:14px;
}

/* 倒數方框 */
.count-box{
  display:flex;
  justify-content:center;
  gap:10px;
}
.time{
  background:#f3f0eb;
  padding:10px;
  border-radius:12px;
  min-width:60px;
  text-align:center;
}
.time span{
  font-size:22px;
  color:#8fa8b8;
}

/* 地圖 */
#map{height:300px;border-radius:16px;}

/* 卡片 */
.active{
  border:2px solid #8fa8b8;
  background:#eef3f6;
}

.btn{
  padding:10px 16px;
  border-radius:999px;
  border:1px solid #8fa8b8;
  background:none;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h2>🌿 新竹導覽</h2>

<!-- 倒數 -->
<div class="card">
  <h3>⏳ 倒數</h3>

  <div class="count-box">
    <div class="time"><span id="d">0</span><br>天</div>
    <div class="time"><span id="h">0</span><br>時</div>
    <div class="time"><span id="m">0</span><br>分</div>
    <div class="time"><span id="s">0</span><br>秒</div>
  </div>
</div>

<!-- 路線順序 -->
<div class="card route">
  ① 好客文創園區 → ② 莫內饗宴 → ③ 青草湖 → ④ 關西農會
</div>

<!-- 地圖 -->
<div class="card">
  <div id="map"></div>
</div>

<!-- 卡片 -->
<div id="cards"></div>

<button class="btn" onclick="nextSpot()">➡ 下一站</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===== 資料 =====
const spots=[
{n:"① 好客文創園區",lat:24.878,lng:121.045,desc:"客家文化"},
{n:"② 莫內饗宴",lat:24.807,lng:120.967,desc:"Buffet"},
{n:"③ 青草湖",lat:24.785,lng:120.970,desc:"湖景"},
{n:"④ 關西農會",lat:24.791,lng:121.177,desc:"伴手禮"}
];

let current=0;

// ===== 地圖 =====
const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const bounds=[];
const markers=[];

spots.forEach((s,i)=>{
 let m=L.marker([s.lat,s.lng]).addTo(map);
 markers.push(m);
 bounds.push([s.lat,s.lng]);
 m.on('click',()=>selectSpot(i));
});

map.fitBounds(bounds);

// 路線
L.polyline(spots.map(s=>[s.lat,s.lng]),{
 color:"#8fa8b8",
 weight:4
}).addTo(map);

// ===== 卡片 =====
function render(){
 let html="";
 spots.forEach((s,i)=>{
  html+=`
  <div class="card ${i===current?'active':''}" onclick="selectSpot(${i})">
  <b>${s.n}</b><br>${s.desc}
  </div>`;
 });
 document.getElementById("cards").innerHTML=html;
}
render();

// ===== 控制 =====
function selectSpot(i){
 current=i;
 render();
 map.setView([spots[i].lat,spots[i].lng],13);
}

function nextSpot(){
 current++;
 if(current>=spots.length) current=0;
 selectSpot(current);
}

// ===== 倒數（方框版）=====
const end=new Date("2026-04-12T08:00:00");

function countdown(){
 let now=new Date();
 let diff=end-now;

 if(diff<=0){
  document.getElementById("d").innerText=0;
  document.getElementById("h").innerText=0;
  document.getElementById("m").innerText=0;
  document.getElementById("s").innerText=0;
  return;
 }

 let d=Math.floor(diff/86400000);
 let h=Math.floor(diff/3600000)%24;
 let m=Math.floor(diff/60000)%60;
 let s=Math.floor(diff/1000)%60;

 document.getElementById("d").innerText=d;
 document.getElementById("h").innerText=h;
 document.getElementById("m").innerText=m;
 document.getElementById("s").innerText=s;
}

setInterval(countdown,1000);
countdown();
</script>

</body>
</html>
