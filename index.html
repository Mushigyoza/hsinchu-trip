<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&family=Noto+Sans+TC&display=swap" rel="stylesheet">

<title>新竹導覽App</title>

<style>
body{
  margin:0;
  font-family:"M PLUS Rounded 1c","Noto Sans TC";
  background:#f9f7f4;
}
.container{padding:16px;}

.card{
  background:#fff;
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
}

/* 路線 */
.route{
  background:#f3f0eb;
  padding:10px;
  border-radius:14px;
}

/* 倒數 */
.count-box{
  display:flex;
  justify-content:center;
  gap:10px;
}
.time{
  background:#f3f0eb;
  padding:10px;
  border-radius:12px;
  min-width:60px;
  text-align:center;
}
.time span{
  font-size:22px;
  color:#8fa8b8;
}

/* 地圖 */
#map{height:300px;border-radius:16px;margin-bottom:10px}

/* 按鈕 */
.btn{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  border:1px solid #8fa8b8;
  color:#8fa8b8;
  text-decoration:none;
  margin-top:6px;
}
.btn:hover{background:#8fa8b8;color:#fff;}

.active{
  border:2px solid #8fa8b8;
  background:#eef3f6;
}
</style>
</head>

<body>

<div class="container">

<h2>🌿 新竹導覽</h2>

<!-- 倒數 -->
<div class="card">
  <h3>⏳ 倒數</h3>
  <div class="count-box">
    <div class="time"><span id="d">0</span><br>天</div>
    <div class="time"><span id="h">0</span><br>時</div>
    <div class="time"><span id="m">0</span><br>分</div>
    <div class="time"><span id="s">0</span><br>秒</div>
  </div>
</div>
<div class="card">

  <h3>📢 行前通知</h3>

  <!-- 集合資訊 -->
  <div style="background:#f3f0eb;padding:12px;border-radius:12px;margin-bottom:10px;">
    <b>集合資訊</b><br>
    日期：2026/04/12（日）<br>
    報到：07:30<br>
    出發：08:00<br>
    地點：台北車站 南二門
  </div>

  <!-- 聯絡 -->
  <div style="margin-bottom:10px;">
    <b>聯絡人</b><br>
    1車：張家基 0935-734109<br>
    2車：葉淑宜 0936-140796<br>
    緊急：鄧秀怡 0985-106242
  </div>

  <!-- 注意事項 -->
  <div style="margin-bottom:10px;">
    <b>注意事項</b>
    <ul style="padding-left:18px;color:#7a7268;">
      <li>請準時報到，逾時不退費</li>
      <li>需攜帶員工識別證正本</li>
      <li>早餐有提供風味包子+白開水</li>
      <li>請配合團體行程，不可脫隊</li>
    </ul>
  </div>
</div>  <!-- 行前通知結束 -->

<!-- 集合地點（新增） -->
<div class="card">

  <details>
    <summary style="cursor:pointer;font-weight:600;">
      📍 集合地點位置圖
    </summary>

    <div style="margin-top:10px;">
      <img src="meeting.png" style="width:100%;border-radius:12px;">

      <a href="https://maps.google.com/?q=台北車站南二門"
         target="_blank"
         class="btn">
        📍 導航到集合點
      </a>
    </div>

  </details>

</div>

  
<!-- 路線 -->
<div class="card route">
  ① 好客文創園區 → ② 莫內饗宴 → ③ 青草湖 → ④ 關西農會
</div>

<!-- 地圖 -->
<div class="card">
  <div id="map"></div>
  <div id="detail">請點擊地圖查看</div>
</div>

<!-- 卡片 -->
<div id="cards"></div>

<button class="btn" onclick="nextSpot()">➡ 下一站</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===== 景點 =====
const spots=[
{
 n:"① 好客文創園區",
 lat:24.878,lng:121.045,
 desc:"客家文化園區",
 map:"https://maps.google.com?q=湖口好客文創園區"
},
{
 n:"② 莫內饗宴",
 lat:24.7751,lng:120.9676,
 desc:"煙波大飯店 新竹湖濱館",
 map:"https://maps.app.goo.gl/EyJTJyAen8XLJcn78"
},
{
 n:"③ 青草湖",
 lat:24.785,lng:120.970,
 desc:"湖景步道",
 map:"https://maps.google.com?q=青草湖"
},
{
 n:"④ 關西農會",
 lat:24.791,lng:121.177,
 desc:"農產市集",
 map:"https://maps.google.com?q=關西農會"
}
];

let current=0;

// ===== 地圖 =====
const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const bounds=[];
const markers=[];

spots.forEach((s,i)=>{
 let m=L.marker([s.lat,s.lng]).addTo(map);
 markers.push(m);
 bounds.push([s.lat,s.lng]);

 m.on('click',()=>{
  selectSpot(i);

  document.getElementById("detail").innerHTML=
  `<b>${s.n}</b><br>${s.desc}<br>
   <a href="${s.map}" target="_blank" class="btn">📍 導航</a>`;
 });
});

map.fitBounds(bounds);

// 路線
L.polyline(spots.map(s=>[s.lat,s.lng]),{
 color:"#8fa8b8",
 weight:4
}).addTo(map);

// ===== 卡片 =====
function render(){
 let html="";
 spots.forEach((s,i)=>{
  html+=`
  <div class="card ${i===current?'active':''}" onclick="selectSpot(${i})">
  <b>${s.n}</b><br>${s.desc}<br>
  <a href="${s.map}" target="_blank" class="btn">📍 導航</a>
  </div>`;
 });
 document.getElementById("cards").innerHTML=html;
}
render();

// ===== 控制 =====
function selectSpot(i){
 current=i;
 render();
 map.setView([spots[i].lat,spots[i].lng],13);

 document.getElementById("detail").innerHTML=
 `<b>${spots[i].n}</b><br>${spots[i].desc}<br>
  <a href="${spots[i].map}" target="_blank" class="btn">📍 導航</a>`;
}

function nextSpot(){
 current++;
 if(current>=spots.length) current=0;
 selectSpot(current);
}

// ===== 倒數 =====
const end=new Date("2026-04-12T08:00:00");

function countdown(){
 let now=new Date();
 let diff=end-now;

 if(diff<=0){
  d.innerText=0;h.innerText=0;m.innerText=0;s.innerText=0;
  return;
 }

 d.innerText=Math.floor(diff/86400000);
 h.innerText=Math.floor(diff/3600000)%24;
 m.innerText=Math.floor(diff/60000)%60;
 s.innerText=Math.floor(diff/1000)%60;
}

setInterval(countdown,1000);
countdown();
</script>

</body>
</html>
